name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]

jobs:
  test:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]

    name: Python ${{ matrix.python }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

  verify:
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Required checks passed
        run: echo "All required CI checks passed."

  tag:
    needs: verify
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      should_release: ${{ steps.release.outputs.should_release }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine release version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          BASE_VERSION=$(python - <<'PY'
          from pathlib import Path
          import re

          content = Path("pyproject.toml").read_text()
          match = re.search(r'(?m)^version = "(.*)"$', content)
          if match is None:
              raise SystemExit("Unable to find version in pyproject.toml")
          print(match.group(1))
          PY
          )

          IFS='.' read -r MAJOR MINOR BASE_PATCH <<< "${BASE_VERSION}"
          LINE_TAG_PREFIX="v${MAJOR}.${MINOR}."
          git fetch --force --tags origin
          LATEST_LINE_TAG=$(git tag --merged HEAD -l "${LINE_TAG_PREFIX}*" --sort=-v:refname | head -n 1)

          if [ -z "${LATEST_LINE_TAG}" ]; then
            NEW_PATCH="${BASE_PATCH}"
          else
            LATEST_PATCH="${LATEST_LINE_TAG##*.}"
            if [ "${BASE_PATCH}" -gt "${LATEST_PATCH}" ]; then
              NEW_PATCH="${BASE_PATCH}"
            else
              NEW_PATCH="$((LATEST_PATCH + 1))"
            fi
          fi

          VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          TAG_NAME="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

          if [ -n "${LATEST_LINE_TAG}" ]; then
            CHANGED_FILES=$(git diff --name-only "${LATEST_LINE_TAG}..HEAD" -- . ':(exclude).github/**')
            if [ -z "${CHANGED_FILES}" ]; then
              echo "Only GitHub configuration changed since ${LATEST_LINE_TAG}; skipping package release."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if git rev-parse -q --verify "refs/tags/${TAG_NAME}^{commit}" >/dev/null; then
            TAG_SHA=$(git rev-list -n 1 "${TAG_NAME}")
            HEAD_SHA=$(git rev-parse HEAD)

            if [ "${TAG_SHA}" = "${HEAD_SHA}" ]; then
              echo "Tag ${TAG_NAME} already points at HEAD."
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Tag ${TAG_NAME} already exists on a different commit (${TAG_SHA}). Delete the stray tag or adjust the base version line in pyproject.toml."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  release:
    needs: tag
    if: github.ref == 'refs/heads/release' && needs.tag.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.tag.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release already exists for ${TAG_NAME}"
          else
            gh release create "${TAG_NAME}" --generate-notes
          fi

  publish:
    needs: [tag, release]
    if: github.ref == 'refs/heads/release' && needs.tag.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout release tag
        env:
          TAG_NAME: ${{ needs.tag.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git checkout "${TAG_NAME}"

      - name: Update build version
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("pyproject.toml")
          content = path.read_text()
          version = "${{ needs.tag.outputs.version }}"
          updated = re.sub(
              r'(?m)^version = ".*"$',
              f'version = "{version}"',
              content,
              count=1,
          )
          if updated != content:
              path.write_text(updated)
          PY

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
